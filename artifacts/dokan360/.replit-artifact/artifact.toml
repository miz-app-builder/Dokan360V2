kind = "web"
previewPath = "/"
title = "Dokan360"
version = "1.0.0"
id = "artifacts/dokan360"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/dokan360 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dokan360", "run", "build" ]
publicDir = "artifacts/dokan360/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
