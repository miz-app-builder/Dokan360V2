          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"
        "404":
          description: Not found

  /leave-requests/{id}/reject:
    patch:
      operationId: rejectLeaveRequest
      tags: [leaves]
      summary: Reject a leave request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
              required: [reason]
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"
        "404":
          description: Not found

  # ─── Leave Balances ───────────────────────────────────────────────────────────
  /leave-balances:
    get:
      operationId: listLeaveBalances
      tags: [leaves]
      summary: Get leave balances for all employees
      security: [{ bearerAuth: [] }]
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: employeeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leave balance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"
        "401":
          description: Unauthorized


  # ─── PAYROLL ────────────────────────────────────────────────────────────────

  /payroll:
    get:
      operationId: listPayroll
      tags: [payroll]
      summary: List payroll records for a month/year
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
        - in: query
          name: year
          required: true
          schema: { type: integer, minimum: 2020 }
        - in: query
          name: employeeId
          schema: { type: integer }
        - in: query
          name: paymentStatus
          schema: { type: string, enum: [unpaid, paid] }
      responses:
        "200":
          description: Payroll records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRecord"

  /hr/analytics:
    get:
      operationId: getHrAnalytics
      tags: [hr]
      summary: HR Analytics — attendance, payroll, leave summary for a month
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
        - in: query
          name: year
          required: true
          schema: { type: integer, minimum: 2020 }
      responses:
        "200":
          description: HR analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrAnalytics"

  /payroll/stats:
    get:
      operationId: getPayrollStats
      tags: [payroll]
      summary: Payroll stats for a month/year
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
        - in: query
          name: year
          required: true
          schema: { type: integer, minimum: 2020 }
      responses:
        "200":
          description: Payroll stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollStats"

  /payroll/generate:
    post:
      operationId: generatePayroll
      tags: [payroll]
      summary: Generate payroll for all active employees for a month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                month: { type: integer, minimum: 1, maximum: 12 }
                year:  { type: integer, minimum: 2020 }
                overtimeRatePerMinute: { type: number }
              required: [month, year]
      responses:
        "201":
          description: Generated payroll records
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated: { type: integer }
                  skipped:   { type: integer }
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayrollRecord"
                required: [generated, skipped, records]

  /payroll/employee/{employeeId}:
    get:
      operationId: getEmployeePayrollHistory
      tags: [payroll]
      summary: Salary history for a single employee
      parameters:
        - in: path
          name: employeeId
          required: true
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, default: 24 }
      responses:
        "200":
          description: Salary history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRecord"

  /payroll/{id}:
    get:
      operationId: getPayrollRecord
      tags: [payroll]
      summary: Get a single payroll record
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Payroll record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"
    patch:
      operationId: updatePayrollRecord
      tags: [payroll]
      summary: Update bonus, deductions, overtime pay, or note
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayrollRecordBody"
      responses:
        "200":
          description: Updated payroll record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"
    delete:
      operationId: deletePayrollRecord
      tags: [payroll]
      summary: Delete a payroll record
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /salary-grades:
    get:
      operationId: listSalaryGrades
      tags: [salaryGrades]
      summary: List all salary grades for the shop
      responses:
        "200":
          description: List of salary grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalaryGrade"
    post:
      operationId: createSalaryGrade
      tags: [salaryGrades]
      summary: Create a new salary grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalaryGradeBody"
      responses:
        "201":
          description: Created salary grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalaryGrade"

  /salary-grades/{id}:
    get:
      operationId: getSalaryGrade
      tags: [salaryGrades]
      summary: Get a salary grade by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Salary grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalaryGrade"
    patch:
      operationId: updateSalaryGrade
      tags: [salaryGrades]
      summary: Update a salary grade
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalaryGradeBody"
      responses:
        "200":
          description: Updated salary grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalaryGrade"
    delete:
      operationId: deleteSalaryGrade
      tags: [salaryGrades]
      summary: Delete a salary grade
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /payroll/{id}/pay:
    post:
      operationId: markPayrollPaid
      tags: [payroll]
      summary: Mark a payroll record as paid
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          description: Updated payroll record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

  # ─── Rotation Patterns ─────────────────────────────────────────────────────

  /rotation-patterns:
    get:
      tags: [schedules]
      summary: List rotation patterns for the shop
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of rotation patterns
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RotationPattern" }
    post:
      tags: [schedules]
      summary: Create a rotation pattern
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRotationPatternBody" }
      responses:
        "201":
          description: Created rotation pattern
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotationPattern" }

  /rotation-patterns/{id}:
    get:
      tags: [schedules]
      summary: Get a rotation pattern with its slots
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Rotation pattern with slots
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotationPatternWithSlots" }
    patch:
      tags: [schedules]
      summary: Update a rotation pattern
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRotationPatternBody" }
      responses:
        "200":
          description: Updated rotation pattern
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotationPattern" }
    delete:
      tags: [schedules]
      summary: Delete a rotation pattern
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /rotation-patterns/{id}/slots:
    put:
      tags: [schedules]
      summary: Bulk-replace all slots for a rotation pattern
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                slots:
                  type: array
                  items: { $ref: "#/components/schemas/RotationSlotInput" }
              required: [slots]
      responses:
        "200":
          description: Updated slots
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RotationPatternSlot" }

  /employees/{id}/rotation:
    get:
      tags: [employees]
      summary: Get the active rotation assignment for an employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Active rotation assignment or null
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeRotationAssignment" }
    post:
      tags: [employees]
      summary: Assign or replace the rotation pattern for an employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patternId: { type: integer }
                startDate: { type: string, format: date }
              required: [patternId, startDate]
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeRotationAssignment" }
    delete:
      tags: [employees]
      summary: Remove the active rotation assignment for an employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /employees/{id}/rotation-schedule:
    get:
      tags: [employees]
      summary: Get the computed effective rotation schedule for an employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Effective rotation schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeRotationSchedule" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ─── AUTH ─────────────────────────────────────────────────────────────────
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        shopName:
          type: string
        shopPhone:
          type: string
      required: [name, email, password, shopName]

    RegisterPendingResponse:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to which the OTP was sent
      required: [email]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [accessToken, refreshToken, user]

    RefreshBody:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
      required: [accessToken]

    LogoutBody:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    ShopInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        currency:
          type: string
        taxNumber:
          type: ["string", "null"]
        taxRate:
          type: number
        invoicePrefix:
          type: ["string", "null"]
        invoiceNote:
          type: ["string", "null"]
        logo:
          type: ["string", "null"]
      required: [id, name, currency]

    UpdateShopBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        taxRate:
          type: number
          nullable: true
        invoicePrefix:
          type: ["string", "null"]
        invoiceNote:
          type: ["string", "null"]
        logo:
          type: ["string", "null"]

    ShopUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, seller, viewer]
        isActive:
          type: boolean
        shopId:
          type: integer
        createdAt:
          type: string
      required: [id, name, email, role, isActive, shopId, createdAt]

    InviteUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, seller, viewer]
      required: [name, email, password, role]

    UpdateUserBody:
      type: object
      properties:
        role:
          type: string
          enum: [admin, seller, viewer]
        isActive:
          type: boolean
        name:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, seller, viewer]
        isActive:
          type: boolean
        shopId:
          type: integer
        shopName:
          type: string
        createdAt:
          type: string
      required: [id, name, email, role, isActive, shopId, shopName, createdAt]

    # ─── CATEGORY ─────────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: integer
        nameBn:
          type: string
        nameEn:
          type: ["string", "null"]
        productCount:
          type: integer
        createdAt:
          type: string
      required: [id, nameBn, productCount, createdAt]

    CreateCategoryBody:
      type: object
      properties:
        nameBn:
          type: string
        nameEn:
          type: ["string", "null"]
      required: [nameBn]

    # ─── PRODUCT ──────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
        nameBn:
          type: string
        nameEn:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        price:
          type: number
        costPrice:
          type: ["number", "null"]
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, nameBn, price, stockQuantity, minStockLevel, unit, isActive, createdAt]

    CreateProductBody:
      type: object
      properties:
        nameBn:
          type: string
        nameEn:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        price:
          type: number
        costPrice:
          type: ["number", "null"]
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        categoryId:
          type: ["integer", "null"]
      required: [nameBn, price, stockQuantity, unit]

    UpdateProductBody:
      type: object
      properties:
        nameBn:
          type: string
        nameEn:
          type: ["string", "null"]
        price:
          type: number
        costPrice:
          type: ["number", "null"]
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        categoryId:
          type: ["integer", "null"]
        isActive:
          type: boolean

    # ─── CUSTOMER ─────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        balance:
          type: number
        totalPurchase:
          type: number
        createdAt:
          type: string
      required: [id, name, balance, totalPurchase, createdAt]

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
      required: [name]

    UpdateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    CollectPaymentBody:
      type: object
      properties:
        amount:
          type: number
        note:
          type: ["string", "null"]
      required: [amount]

    LedgerEntry:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: number
        balance:
          type: number
        note:
          type: ["string", "null"]
        saleId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [id, type, amount, balance, createdAt]

    # ─── SALES ────────────────────────────────────────────────────────────────
    Sale:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        total:
          type: number
        discount:
          type: number
        paid:
          type: number
        due:
          type: number
        paymentMethod:
          type: string
        itemCount:
          type: integer
        createdAt:
          type: string
      required: [id, invoiceNumber, total, discount, paid, due, paymentMethod, itemCount, createdAt]

    SaleItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productNameBn:
          type: string
        quantity:
          type: number
        price:
          type: number
        subtotal:
          type: number
      required: [id, productId, productNameBn, quantity, price, subtotal]

    SaleDetail:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        total:
          type: number
        discount:
          type: number
        paid:
          type: number
        due:
          type: number
        paymentMethod:
          type: string
        note:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        createdAt:
          type: string
      required: [id, invoiceNumber, total, discount, paid, due, paymentMethod, items, createdAt]

    CreateSaleBody:
      type: object
      properties:
        customerId:
          type: ["integer", "null"]
        discount:
          type: number
        paid:
          type: number
        paymentMethod:
          type: string
        note:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItemBody"
      required: [paid, paymentMethod, items]

    CreateSaleItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: number
        price:
          type: number
      required: [productId, quantity, price]

