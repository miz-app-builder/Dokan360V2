    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        nameBn:
          type: string
        nameEn:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        categoryName:
          type: ["string", "null"]
        isLowStock:
          type: boolean
      required: [id, nameBn, stockQuantity, minStockLevel, unit, isLowStock]

    AdjustInventoryBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        type:
          type: string
          enum: [in, out, adjustment]
        reason:
          type: ["string", "null"]
      required: [productId, quantity, type]

    InventoryAdjustment:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productNameBn:
          type: string
        quantity:
          type: integer
        type:
          type: string
        reason:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, productId, productNameBn, quantity, type, createdAt]

    # ─── DASHBOARD ────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        todaySales:
          type: number
        todayTransactions:
          type: integer
