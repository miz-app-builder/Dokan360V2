    # ─── Rotation Pattern Schemas ───────────────────────────────────────────────

    RotationPattern:
      type: object
      properties:
        id:          { type: integer }
        shopId:      { type: integer }
        name:        { type: string }
        nameBn:      { type: string }
        cycleType:   { type: string, enum: [daily, weekly, monthly] }
        cycleLength: { type: integer }
        startDate:   { type: string, format: date }
        isDefault:   { type: boolean }
        isActive:    { type: boolean }
        createdAt:   { type: string }
        updatedAt:   { type: string }
      required: [id, shopId, name, nameBn, cycleType, cycleLength, startDate, isDefault, isActive, createdAt, updatedAt]

    RotationPatternSlot:
      type: object
      properties:
        id:         { type: integer }
        patternId:  { type: integer }
        slotIndex:  { type: integer }
        weekday:    { type: integer, nullable: true }
        shiftId:    { type: integer, nullable: true }
        shiftName:  { type: string, nullable: true }
        shiftNameBn: { type: string, nullable: true }
        shiftColor: { type: string, nullable: true }
        shiftStartTime: { type: string, nullable: true }
        shiftEndTime:   { type: string, nullable: true }
        createdAt:  { type: string }
        updatedAt:  { type: string }
      required: [id, patternId, slotIndex, weekday, shiftId, shiftName, shiftNameBn, shiftColor, shiftStartTime, shiftEndTime, createdAt, updatedAt]

    RotationPatternWithSlots:
      allOf:
        - $ref: "#/components/schemas/RotationPattern"
        - type: object
          properties:
            slots:
              type: array
              items: { $ref: "#/components/schemas/RotationPatternSlot" }
          required: [slots]

    RotationSlotInput:
      type: object
      properties:
        slotIndex: { type: integer }
        weekday:   { type: integer, nullable: true }
        shiftId:   { type: integer, nullable: true }
      required: [slotIndex]

    CreateRotationPatternBody:
      type: object
      properties:
        name:        { type: string }
        nameBn:      { type: string }
        cycleType:   { type: string, enum: [daily, weekly, monthly] }
        cycleLength: { type: integer, minimum: 1, maximum: 12 }
        startDate:   { type: string, format: date }
        isDefault:   { type: boolean }
      required: [name, nameBn, cycleType, cycleLength, startDate]

    UpdateRotationPatternBody:
      type: object
      properties:
        name:        { type: string }
        nameBn:      { type: string }
        cycleType:   { type: string, enum: [daily, weekly, monthly] }
        cycleLength: { type: integer, minimum: 1, maximum: 12 }
        startDate:   { type: string, format: date }
        isDefault:   { type: boolean }
        isActive:    { type: boolean }

    EmployeeRotationAssignment:
      type: object
      properties:
        id:          { type: integer }
        employeeId:  { type: integer }
        patternId:   { type: integer }
        patternName: { type: string }
        patternNameBn: { type: string }
        cycleType:   { type: string, enum: [daily, weekly, monthly] }
        cycleLength: { type: integer }
        startDate:   { type: string, format: date }
        endDate:     { type: string, format: date, nullable: true }
        createdAt:   { type: string }
      required: [id, employeeId, patternId, patternName, patternNameBn, cycleType, cycleLength, startDate, endDate, createdAt]

    RotationDaySlot:
      type: object
      properties:
        weekday:        { type: integer }
        shiftId:        { type: integer, nullable: true }
        shiftName:      { type: string, nullable: true }
        shiftNameBn:    { type: string, nullable: true }
        shiftColor:     { type: string, nullable: true }
        shiftStartTime: { type: string, nullable: true }
        shiftEndTime:   { type: string, nullable: true }
      required: [weekday, shiftId, shiftName, shiftNameBn, shiftColor, shiftStartTime, shiftEndTime]

    EmployeeRotationSchedule:
      type: object
      properties:
        hasRotation:     { type: boolean }
        patternId:       { type: integer, nullable: true }
        patternName:     { type: string, nullable: true }
        patternNameBn:   { type: string, nullable: true }
        cycleType:       { type: string, enum: [daily, weekly, monthly], nullable: true }
        cycleLength:     { type: integer, nullable: true }
        currentSlotIndex: { type: integer, nullable: true }
        days:
          type: array
          items: { $ref: "#/components/schemas/RotationDaySlot" }
      required: [hasRotation, patternId, patternName, patternNameBn, cycleType, cycleLength, currentSlotIndex, days]
